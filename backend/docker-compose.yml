services:
  db:
    image: pgvector/pgvector:pg16
    container_name: agentdesk_db
    environment:
      POSTGRES_USER: agentdesk
      POSTGRES_PASSWORD: agentdesk_password
      POSTGRES_DB: agentdesk_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init:/docker-entrypoint-initdb.d
    restart: unless-stopped

  pgadmin:
    image: dpage/pgadmin4
    container_name: agentdesk_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@agentdesk.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - db
    restart: unless-stopped

volumes:
  postgres_data:

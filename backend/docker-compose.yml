services:
  db:
    image: postgres:15-alpine
    container_name: agentdesk_db
    environment:
      POSTGRES_USER: agentdesk
      POSTGRES_PASSWORD: agentdesk_password
      POSTGRES_DB: agentdesk_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres_data:
